<!DOCTYPE html>
<html>
<head>
  <title>Advanced Survival Shooter</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ================= PLAYER =================
const player = {
  x: canvas.width/2,
  y: canvas.height/2,
  vx: 0,
  vy: 0,
  size: 15,
  speed: 0.4,
  friction: 0.9,
  hp: 100,
  maxHp: 100,
  level: 1,
  xp: 0
};

// ================= INPUT =================
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

let mouse = { x: 0, y: 0 };
window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

// ================= EFFECTS =================
let shake = 0;
function screenShake(power) {
  shake = power;
}

// ================= BULLETS =================
let bullets = [];
let shootCooldown = 0;

function shoot() {
  if (shootCooldown > 0) return;

  const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  bullets.push({
    x: player.x,
    y: player.y,
    dx: Math.cos(angle) * 10,
    dy: Math.sin(angle) * 10,
    life: 60
  });

  shootCooldown = 10;
}

window.addEventListener("click", shoot);

// ================= ENEMIES =================
let enemies = [];

function spawnEnemy() {
  const type = Math.random();

  let e = {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: 0,
    vy: 0
  };

  if (type < 0.7) {
    e.size = 15;
    e.speed = 1.5;
    e.hp = 2;
    e.color = "red";
  } else {
    e.size = 30;
    e.speed = 0.7;
    e.hp = 6;
    e.color = "purple";
  }

  enemies.push(e);
}

// ================= PARTICLES =================
let particles = [];

function explode(x, y) {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x, y,
      dx: (Math.random() - 0.5) * 5,
      dy: (Math.random() - 0.5) * 5,
      life: 30
    });
  }
}

// ================= UPDATE =================
function update() {

  // movement (smooth)
  if (keys["w"]) player.vy -= player.speed;
  if (keys["s"]) player.vy += player.speed;
  if (keys["a"]) player.vx -= player.speed;
  if (keys["d"]) player.vx += player.speed;

  player.vx *= player.friction;
  player.vy *= player.friction;

  player.x += player.vx;
  player.y += player.vy;

  // regen
  player.hp = Math.min(player.maxHp, player.hp + 0.02);

  // shooting cooldown
  if (shootCooldown > 0) shootCooldown--;

  // bullets
  bullets.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;
    b.life--;
  });

  bullets = bullets.filter(b => b.life > 0);

  // enemies
  enemies.forEach(e => {
    const angle = Math.atan2(player.y - e.y, player.x - e.x);
    e.vx += Math.cos(angle) * 0.1;
    e.vy += Math.sin(angle) * 0.1;

    e.vx *= 0.9;
    e.vy *= 0.9;

    e.x += e.vx;
    e.y += e.vy;

    if (Math.hypot(e.x - player.x, e.y - player.y) < e.size) {
      player.hp -= 0.3;
      screenShake(10);
    }
  });

  // collisions
  enemies.forEach((e, ei) => {
    bullets.forEach((b, bi) => {
      if (Math.hypot(e.x - b.x, e.y - b.y) < e.size) {
        e.hp--;
        bullets.splice(bi, 1);

        if (e.hp <= 0) {
          explode(e.x, e.y);
          enemies.splice(ei, 1);

          player.xp += 10;
          if (player.xp >= 100) {
            player.level++;
            player.xp = 0;
            player.maxHp += 20;
            player.hp = player.maxHp;
          }
        }
      }
    });
  });

  // particles
  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;
    p.life--;
  });

  particles = particles.filter(p => p.life > 0);

  // spawn
  if (Math.random() < 0.03 + player.level * 0.005) spawnEnemy();
}

// ================= DRAW =================
function draw() {

  // screen shake
  ctx.save();
  ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
  shake *= 0.9;

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // player glow
  ctx.shadowBlur = 20;
  ctx.shadowColor = "cyan";

  ctx.fillStyle = "cyan";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
  ctx.fill();

  ctx.shadowBlur = 0;

  // bullets
  ctx.fillStyle = "yellow";
  bullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
    ctx.fill();
  });

  // enemies
  enemies.forEach(e => {
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size, 0, Math.PI*2);
    ctx.fill();
  });

  // particles
  ctx.fillStyle = "orange";
  particles.forEach(p => {
    ctx.fillRect(p.x, p.y, 3, 3);
  });

  // UI
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("HP: " + Math.floor(player.hp), 20, 30);
  ctx.fillText("Level: " + player.level, 20, 60);
  ctx.fillText("XP: " + player.xp + "/100", 20, 90);

  ctx.restore();
}

// ================= LOOP =================
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
